<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3EFEEM45C4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-3EFEEM45C4');
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>עמיעד אבנר – משרד עורכי דין</title>

  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: "Abraham";
      src: url("hillelclm-medium-webfont.woff") format("woff");
      font-display: swap;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: "Abraham", "Assistant", Arial, sans-serif;
      min-height: 100vh;
      background: #dbeaf7 url('clouds-bg.png') center / cover no-repeat fixed;
      color: #123169;
      line-height: 1.6;
    }

    .container { width: 90%; max-width: 1200px; margin: 0 auto; }

    /* ===== Header ===== */
    header {
      background: #fff;
      box-shadow: 0 2px 4px rgba(0,0,0,.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 70px;
      gap: 1.5rem;
    }

    .logo-box {
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    .logo-image { height: 70px; }

    .logo-text {
      font-size: 1.4rem;
      font-weight: 700;
      white-space: nowrap;
    }

    nav ul {
      display: flex;
      gap: 1.2rem;
      list-style: none;
    }

    nav a {
      text-decoration: none;
      color: #123169;
      padding: .4rem .6rem;
    }

    .phone-box {
      border: 2px solid #c06a27;
      color: #c06a27;
      border-radius: 999px;
      padding: .3em 1em;
      display: flex;
      align-items: center;
      gap: .4em;
      font-weight: 500;
    }

    /* ===== Hero ===== */
    .hero {
      position: relative;
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow: hidden;
    }

    .hero-bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    /* ===== הקופסה הראשית – גדולה ורחבה ===== */
    .hero-content {
      background: rgba(255,255,255,0.97);
      border-radius: 18px;
      border: 1.5px solid #b3cae6;
      box-shadow: 0 12px 38px rgba(34,53,84,0.12);
      padding: 3.8rem 3.2rem 3rem;
      max-width: 900px;
      width: min(94vw, 900px);
      text-align: center;
      min-height: 340px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .hero-content h1 {
      font-size: 2.4rem;
      margin-bottom: .8rem;
    }

    .hero-content p {
      font-size: 1.15rem;
      margin-bottom: 1.8rem;
    }

    .btn-primary {
      background: #123169;
      color: #fff;
      border: none;
      padding: .9rem 2.6rem;
      font-size: 1.1rem;
      border-radius: 6px;
      cursor: pointer;
    }

    /* ===== Responsive ===== */
    @media (max-width: 600px) {
      .hero-content {
        padding: 2rem 1.4rem;
        min-height: 250px;
        max-width: 96%;
      }

      .hero-content h1 {
        font-size: 1.7rem;
      }

      .hero-content p {
        font-size: .95rem;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="container header-inner">
    <div class="logo-box">
      <img src="logo.png" class="logo-image" alt="לוגו">
      <span class="logo-text">עמיעד אבנר – משרד עורכי דין</span>
    </div>
    <nav>
      <ul>
        <li><a href="#home">דף הבית</a></li>
        <li><a href="#services">תחומי התמחות</a></li>
        <li><a href="#about">אודות</a></li>
        <li><a href="#contact">צרו קשר</a></li>
      </ul>
    </nav>
    <div class="phone-box">052-450-0645</div>
  </div>
</header>

<section id="home" class="hero">
  <video class="hero-bg-video" src="Foresttt.mp4" autoplay muted playsinline></video>

  <div class="hero-inner">
    <div class="hero-content">
      <h1>עמיעד אבנר – משרד בוטיק</h1>
      <p>מקרקעין | מיסוי מקרקעין | ייפוי כוח מתמשך | צוואות</p>
      <button class="btn-primary"
        onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth'})">
        צרו קשר עכשיו
      </button>
    </div>
  </div>
</section>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const vid = document.querySelector('.hero-bg-video');
    if (vid) {
      vid.addEventListener('ended', () => {
        vid.pause();
        vid.currentTime = vid.duration;
      });
    }
  });
</script>

</body>
</html>
